<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merhaba Jenkins</title>
  <style>
    /* Genel stil */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #f0e6d2, #c9b79c);
      color: #333;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 3em;
      color: #6b4226;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2em;
      line-height: 1.5;
      max-width: 600px;
      margin: 0 auto 20px;
    }

    .highlight {
      color: #d46a6a;
      font-weight: bold;
    }

    .button {
      display: inline-block;
      padding: 12px 25px;
      background-color: #8c5e3c;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .button:hover {
      background-color: #6b4226;
    }

    footer {
      margin-top: 40px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Merhaba Jenkins!</h1>
  <p>Bu site <span class="highlight">tamamen otomatik</span> olarak senin sunucuna yüklendi!</p>
  <p>Kodexis DevOps yolculuğunda bir adım daha attık. 🚀</p>

  <footer>
